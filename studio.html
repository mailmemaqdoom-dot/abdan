<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>ABDAN Studio 💎</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
  <link rel="icon" type="image/jpeg"    href="./assets/abdan-icon.jpg" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/studio.css" />
</head>
<body>

  <!-- ── Sidebar (desktop) / Drawer (mobile) ──────────────────── -->
  <aside class="s-aside" id="sAside" aria-label="Studio navigation">
    <div class="s-brand">
      <a href="/" class="s-brand__logo" title="View ABDAN">
        <img src="./assets/abdan-icon.jpg" alt="ABDAN" width="36" height="36" />
      </a>
      <div class="s-brand__copy">
        <strong>
          <!-- Official calligraphy for ABDAN brand identity in Studio sidebar -->
          <span class="s-brand__wordmark" aria-label="ABDAN">
            <img class="s-brand__wordmark-img" src="./assets/logo/abdan-wordmark-full.jpeg" alt="" draggable="false" />
            <span class="s-brand__wordmark-text" aria-hidden="true">ABDAN</span>
          </span><span class="s-brand__wordmark-suffix"> Studio</span>
        </strong>
        <span>💎 Brand Operating System</span>
      </div>
    </div>

    <nav class="s-nav" id="sNav" aria-label="Studio sections"></nav>

    <div class="s-aside-foot">
      <button class="s-aside-link" id="sThemeBtn" type="button">
        <i data-lucide="moon" class="s-icon"></i>
        <span>Dark mode</span>
      </button>
      <a class="s-aside-link" href="/" target="_blank" rel="noreferrer">
        <i data-lucide="external-link" class="s-icon"></i>
        <span>View ABDAN</span>
      </a>
      <button class="s-aside-link s-aside-link--out" id="sSignoutBtn" type="button">
        <i data-lucide="log-out" class="s-icon"></i>
        <span>Sign out</span>
      </button>
    </div>
  </aside>

  <!-- Mobile sidebar overlay -->
  <div class="s-aside-overlay" id="sAsideOverlay"></div>

  <!-- ── Main shell ─────────────────────────────────────────────── -->
  <div class="s-shell" id="sShell">

    <header class="s-topbar">
      <button class="s-menu-btn" id="sMenuBtn" type="button" aria-label="Open navigation">
        <i data-lucide="menu" class="s-icon"></i>
      </button>
      <h1 class="s-topbar__title" id="sPageTitle">Studio Overview</h1>
      <div class="s-topbar__actions" id="sTopbarActions"></div>
    </header>

    <main class="s-content" id="sContent" tabindex="-1">
      <!-- Views rendered by studio.js -->
      <div class="s-loading" id="sLoading">
        <div class="s-loading__mark">💎</div>
        <p>Loading ABDAN Studio…</p>
      </div>
    </main>

  </div>

  <!-- ── Slide panel (forms / detail) ─────────────────────────── -->
  <aside class="s-panel" id="sPanel" hidden role="dialog" aria-modal="true">
    <div class="s-panel__inner">
      <div class="s-panel__head">
        <h2 class="s-panel__title" id="sPanelTitle"></h2>
        <button class="s-panel__close" id="sPanelClose" type="button" aria-label="Close">
          <i data-lucide="x" class="s-icon"></i>
        </button>
      </div>
      <div class="s-panel__body" id="sPanelBody"></div>
      <div class="s-panel__foot" id="sPanelFoot" hidden>
        <button class="s-btn s-btn--ghost" id="sPanelCancel" type="button">Cancel</button>
        <button class="s-btn s-btn--primary" id="sPanelSave" type="button">Save</button>
      </div>
    </div>
  </aside>
  <div class="s-panel-overlay" id="sPanelOverlay" hidden></div>

  <!-- ── Mobile bottom tab bar ─────────────────────────────────── -->
  <nav class="s-tabbar" aria-label="Quick navigation">
    <button class="s-tab" data-nav="overview"   type="button"><i data-lucide="layout-dashboard" class="s-icon"></i><span>Overview</span></button>
    <button class="s-tab" data-nav="products"   type="button"><i data-lucide="shopping-bag"     class="s-icon"></i><span>Pieces</span></button>
    <button class="s-tab" data-nav="orders"     type="button"><i data-lucide="receipt"           class="s-icon"></i><span>Orders</span></button>
    <button class="s-tab" data-nav="customers"  type="button"><i data-lucide="users"             class="s-icon"></i><span>Her Circle</span></button>
    <button class="s-tab" id="sTabMore"         type="button"><i data-lucide="grid"              class="s-icon"></i><span>More</span></button>
  </nav>

  <!-- Toast -->
  <output class="s-toast" id="sToast" aria-live="polite" aria-atomic="true"></output>

  <script src="https://unpkg.com/lucide@latest" defer></script>
  <script src="./js/studio.js"></script>
</body>
</html>
